name: proyecto_intermodular
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  intl: ^0.20.2
  pdf: ^3.12.0
  share_plus: ^12.0.1
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets: 
  - .env 
  - assets/images/
  #fuente  para la funcionalidad de exportacion en pdf 
  - assets/fonts/Roboto-Regular.ttf
  - assets/fonts/Roboto-Bold.ttf


